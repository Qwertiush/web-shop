name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Cache node modules
              uses: actions/cache@v3
              with:
                path: ~/.npm
                key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
                restore-keys:
                    ${{ runner.os }}-node-

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test:run

            - name: Build project
              run: npm run build